<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yuruicamp 賣家後台</title>

  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <!-- Font Awesome 6 圖示庫 -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- 後台專屬樣式 -->
  <link rel="stylesheet" href="css/admin.css">
</head>

<body class="d-flex">

  <!-- ============================================================
       ① 左側 Sidebar（桌面版固定顯示，手機版隱藏）
       ============================================================ -->
  <aside id="adminSidebar" class="d-flex flex-column">

    <!-- 品牌 Logo 區塊 -->
    <div class="sidebar-brand">
      <h5 class="text-white fw-bold mb-0">
        <i class="fas fa-campground me-2" style="color: var(--admin-sidebar-active-border);"></i>
        Yuruicamp
      </h5>
      <small style="color: var(--admin-sidebar-text);">賣家後台管理系統</small>
    </div>

    <!-- 導覽選單 -->
    <nav class="flex-grow-1 mt-2">
      <!-- data-section 屬性：對應 partials/ 資料夾的 HTML 檔名 -->
      <!-- data-title 屬性：對應 Topbar 顯示的頁面標題 -->
      <a href="#" class="sidebar-link active"
         data-section="analytics" data-title="分析報表">
        <i class="fas fa-chart-line"></i>
        <span>分析報表</span>
      </a>
      <a href="#" class="sidebar-link"
         data-section="orders" data-title="訂單管理">
        <i class="fas fa-shopping-bag"></i>
        <span>訂單管理</span>
      </a>
      <a href="#" class="sidebar-link"
         data-section="products" data-title="商品與庫存">
        <i class="fas fa-box-open"></i>
        <span>商品與庫存</span>
      </a>
      <a href="#" class="sidebar-link"
         data-section="customers" data-title="客戶管理">
        <i class="fas fa-users"></i>
        <span>客戶管理</span>
      </a>
      <a href="#" class="sidebar-link"
         data-section="discounts" data-title="折扣管理">
        <i class="fas fa-tag"></i>
        <span>折扣管理</span>
      </a>
      <a href="#" class="sidebar-link"
         data-section="reviews" data-title="評論管理">
        <i class="fas fa-star"></i>
        <span>評論管理</span>
      </a>
    </nav>

    <!-- 底部：管理員資訊 + 登出 -->
    <div class="sidebar-footer">
      <div class="d-flex align-items-center gap-2 mb-2">
        <i class="fas fa-user-shield" style="color: var(--admin-sidebar-text);"></i>
        <small style="color: var(--admin-sidebar-text);" id="sidebarAdminName">管理員</small>
      </div>
      <a href="#" id="logoutBtn"
         class="d-flex align-items-center gap-2 text-decoration-none"
         style="color: var(--admin-sidebar-text);">
        <i class="fas fa-sign-out-alt"></i>
        <span class="small">登出系統</span>
      </a>
    </div>

  </aside>

  <!-- ============================================================
       ② 手機版 Offcanvas Sidebar（由漢堡按鈕觸發，從左滑出）
       ============================================================ -->
  <div class="offcanvas offcanvas-start" id="mobileSidebar" tabindex="-1">
    <div class="offcanvas-header">
      <h5 class="text-white fw-bold mb-0">
        <i class="fas fa-campground me-2" style="color: var(--admin-sidebar-active-border);"></i>
        Yuruicamp
      </h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0">
      <nav>
        <a href="#" class="sidebar-link active"
           data-section="analytics" data-title="分析報表">
          <i class="fas fa-chart-line"></i><span>分析報表</span>
        </a>
        <a href="#" class="sidebar-link"
           data-section="orders" data-title="訂單管理">
          <i class="fas fa-shopping-bag"></i><span>訂單管理</span>
        </a>
        <a href="#" class="sidebar-link"
           data-section="products" data-title="商品與庫存">
          <i class="fas fa-box-open"></i><span>商品與庫存</span>
        </a>
        <a href="#" class="sidebar-link"
           data-section="customers" data-title="客戶管理">
          <i class="fas fa-users"></i><span>客戶管理</span>
        </a>
        <a href="#" class="sidebar-link"
           data-section="discounts" data-title="折扣管理">
          <i class="fas fa-tag"></i><span>折扣管理</span>
        </a>
        <a href="#" class="sidebar-link"
           data-section="reviews" data-title="評論管理">
          <i class="fas fa-star"></i><span>評論管理</span>
        </a>
        <div class="sidebar-footer mt-auto">
          <a href="#" class="sidebar-logout-mobile d-flex align-items-center gap-2
                             text-decoration-none"
             style="color: var(--admin-sidebar-text);">
            <i class="fas fa-sign-out-alt"></i>
            <span class="small">登出系統</span>
          </a>
        </div>
      </nav>
    </div>
  </div>

  <!-- ============================================================
       ③ 右側主區域（Topbar + 動態內容區）
       ============================================================ -->
  <div id="mainWrapper">

    <!-- Topbar -->
    <header id="adminTopbar">

      <!-- 左側：漢堡按鈕（手機版）+ 頁面標題 -->
      <div class="d-flex align-items-center gap-3">
        <!-- 漢堡按鈕：只在手機版（< md）顯示 -->
        <button class="btn d-md-none p-1" type="button"
                data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar"
                aria-label="開啟選單">
          <i class="fas fa-bars fs-5"></i>
        </button>
        <!-- 動態頁面標題（由 core.js 在切換 Sidebar 時更新） -->
        <h5 class="mb-0 fw-semibold" id="pageTitle">分析報表</h5>
      </div>

      <!-- 右側：通知鈴鐺 + 管理員頭像下拉 -->
      <div class="d-flex align-items-center gap-2">

        <!-- 通知鈴鐺（數字 Badge 代表未讀通知） -->
        <button class="btn position-relative" type="button" title="通知">
          <i class="fas fa-bell fs-5 text-secondary"></i>
          <span class="position-absolute top-0 start-100 translate-middle
                       badge rounded-pill bg-danger" id="notifBadge">
            3
          </span>
        </button>

        <!-- 管理員頭像下拉選單 -->
        <div class="dropdown">
          <!-- 頭像按鈕（使用字首縮寫代替圖片） -->
          <div class="rounded-circle d-flex align-items-center justify-content-center
                      text-white fw-bold"
               style="width:36px; height:36px;
                      background-color: var(--admin-brand-accent);
                      cursor: pointer;"
               role="button"
               data-bs-toggle="dropdown"
               id="adminAvatarBtn"
               title="管理員選單">
            A
          </div>
          <ul class="dropdown-menu dropdown-menu-end mt-1">
            <li>
              <span class="dropdown-item-text text-muted small" id="topbarAdminName">
                <i class="fas fa-user me-2"></i>管理員
              </span>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <a class="dropdown-item text-danger" href="#" id="logoutBtnTopbar">
                <i class="fas fa-sign-out-alt me-2"></i>登出
              </a>
            </li>
          </ul>
        </div>

      </div>
    </header>

    <!-- 動態內容區（各 partial HTML 由 AJAX 注入此處） -->
    <main id="contentArea" class="p-4 flex-grow-1">
      <!-- 初始載入 Spinner，待 core.js ready 後替換 -->
      <div class="text-center py-5">
        <div class="spinner-border" style="color: var(--admin-brand-accent);"></div>
        <p class="mt-2 text-muted small">載入中...</p>
      </div>
    </main>

  </div><!-- end #mainWrapper -->

  <!-- ============================================================
       全域 Modal：訂單明細（靜態放在 dashboard，由 orders.js 填入內容）
       ============================================================ -->
  <div class="modal fade" id="orderDetailModal" tabindex="-1"
       aria-labelledby="orderDetailModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="orderDetailModalLabel">
            訂單明細 — <span id="modalOrderId" class="text-muted"></span>
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">

          <!-- 訂單基本資訊 -->
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <small class="text-muted d-block">買家姓名</small>
              <span id="modalBuyerName" class="fw-semibold"></span>
            </div>
            <div class="col-md-6">
              <small class="text-muted d-block">訂單狀態</small>
              <span id="modalOrderStatus"></span>
            </div>
          </div>

          <!-- 商品清單表格 -->
          <h6 class="fw-semibold mb-2 mt-3">
            <i class="fas fa-list me-2 text-muted"></i>商品清單
          </h6>
          <table class="table table-sm table-bordered mb-0">
            <thead class="table-light">
              <tr>
                <th>商品名稱</th>
                <th class="text-center">數量</th>
                <th class="text-end">單價</th>
                <th class="text-end">小計</th>
              </tr>
            </thead>
            <tbody id="modalItemsList"></tbody>
            <tfoot class="table-light">
              <tr>
                <td colspan="3" class="text-end fw-semibold">合計</td>
                <td class="text-end fw-bold" id="modalTotal"></td>
              </tr>
            </tfoot>
          </table>

          <hr class="my-3">

          <!-- 收件資訊 -->
          <h6 class="fw-semibold mb-2">
            <i class="fas fa-map-marker-alt me-2 text-muted"></i>收件資訊
          </h6>
          <p id="modalAddress" class="text-muted mb-0"></p>

          <hr class="my-3">

          <!-- 訂單紀錄時間軸 -->
          <!-- orders.js 的 showOrderModal() 會動態填入 #modalHistory -->
          <h6 class="fw-semibold mb-2">
            <i class="fas fa-history me-2 text-muted"></i>訂單紀錄
          </h6>
          <ul id="modalHistory" class="list-unstyled small mb-0">
            <!-- 每筆格式：時間 + 動作，由 orders.js 動態產生 -->
          </ul>

        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================================
       全域 Modal：新增商品（靜態放在 dashboard，由 products.js 處理）
       ============================================================ -->
  <div class="modal fade" id="addProductModal" tabindex="-1"
       aria-labelledby="addProductModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="addProductModalLabel">
            <i class="fas fa-plus me-2"></i>新增商品
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="addProductForm" novalidate>

            <!-- 商品名稱 -->
            <div class="mb-3">
              <label class="form-label fw-semibold" for="newProductName">
                商品名稱 <span class="text-danger">*</span>
              </label>
              <input type="text" class="form-control" id="newProductName"
                     placeholder="例：Coleman 六人帳篷" required>
              <div class="invalid-feedback">請輸入商品名稱</div>
            </div>

            <!-- 商品描述：只作為表單輸入欄位，不寫回 JSON、不渲染到商品列表 -->
            <div class="mb-3">
              <label class="form-label fw-semibold" for="newProductDescription">
                商品描述
              </label>
              <textarea class="form-control" id="newProductDescription"
                        rows="3" placeholder="請填入商品描述"></textarea>
            </div>

            <!-- 商品圖片 -->
            <div class="row g-2 mb-3">
              <div class="col-6">
                <label class="form-label fw-semibold" for="newProductMainImage">主要圖片</label>
                <input type="file" class="form-control" id="newProductMainImage"
                       accept="image/*">
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold" for="newProductImages">次要圖片（可多選）</label>
                <input type="file" class="form-control" id="newProductImages"
                       accept="image/*" multiple>
              </div>
            </div>

            <!-- 分類 + 規格/顏色 -->
            <div class="row g-2 mb-3">
              <div class="col-6">
                <label class="form-label fw-semibold" for="newProductCategory">分類</label>
                <select class="form-select" id="newProductCategory">
                  <option>帳篷</option>
                  <option>睡袋</option>
                  <option>炊具</option>
                  <option>燈具</option>
                  <option>背包</option>
                  <option>其他</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold" for="newProductSpec">規格 / 顏色</label>
                <div class="input-group">
                  <input type="text" class="form-control" id="newProductSpec"
                         list="productSpecOptions" placeholder="例：weight">
                  <button type="button" class="btn btn-outline-secondary" id="addSpec">新增</button>
                </div>
                <datalist id="productSpecOptions"></datalist>
                <div id="productSpecFields" class="mt-2"></div>
              </div>
            </div>

            <!-- 售價 + 初始庫存 -->
            <div class="row g-2 mb-3">
              <div class="col-6">
                <label class="form-label fw-semibold" for="newProductPrice">
                  售價 (NT$) <span class="text-danger">*</span>
                </label>
                <input type="number" class="form-control" id="newProductPrice"
                       min="1" placeholder="例：3200" required>
                <div class="invalid-feedback">請輸入售價</div>
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold" for="newProductStock">初始庫存</label>
                <input type="number" class="form-control" id="newProductStock"
                       min="0" value="0">
              </div>
            </div>

            <!-- 租借商品設定 -->
            <div class="mb-3">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" role="switch" id="newProductIsRental">
                <label class="form-check-label fw-semibold" for="newProductIsRental">
                  是否為租借商品
                </label>
              </div>
              <div class="mt-2 d-none" id="rentalCampField">
                <label class="form-label fw-semibold" for="newRentalCamp">存放營地: </label>
                <input type="text" class="form-control" id="newRentalCamp"
                       placeholder="例：湖畔星空營地">
              </div>
            </div>

            <!-- Modal Footer 放在 form 內部，確保 submit 可觸發 -->
            <div class="d-flex justify-content-end gap-2 pt-2 border-top mt-3">
              <button type="button" class="btn btn-secondary"
                      data-bs-dismiss="modal">取消</button>
              <button type="button" id="submitAddProduct" class="btn text-white"
                      style="background-color: var(--admin-brand-accent);">
                <i class="fas fa-plus me-1"></i>建立商品
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================================
       CDN JavaScript 引用（順序固定：jQuery → Bootstrap → Chart.js → 自訂 JS）
       ============================================================ -->
  <!-- jQuery 3.7.1 -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Bootstrap 5 Bundle（含 Popper.js） -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Chart.js 圖表庫 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- 後台自訂 JS（core.js 必須最先載入，其他模組才能正確初始化） -->
  <script src="js/core.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/orders.js"></script>
  <script src="js/products.js"></script>
  <script src="js/customers.js"></script>
  <script src="js/discounts.js"></script>
  <script src="js/reviews.js"></script>

</body>
</html>
