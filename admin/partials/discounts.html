<!-- partials/discounts.html
     折扣管理頁面
     由 core.js 的 $.load() 注入到 #contentArea
     折扣券生成邏輯與列表渲染由 discounts.js 處理
-->

<section class="yr-admin-discounts-module">
<!-- ===== 新增優惠券操作區 ===== -->
<div class="card shadow-sm border-0 mb-4">
  <div class="card-body">
    <div class="row g-3 align-items-end" id="addCouponForm">

      <!-- ===== 第一列：優惠碼 / 折扣類型 / 發行數量 ===== -->

      <!-- 優惠碼 + 隨機生成按鈕 -->
      <div class="col-md-4">
        <label class="form-label small text-muted" for="newCouponCode">
          優惠碼 <span class="text-danger">*</span>
        </label>
        <div class="input-group">
          <input type="text" class="form-control text-uppercase" id="newCouponCode"
                 placeholder="例：CAMP200" maxlength="20">
          <button class="btn btn-outline-secondary" type="button"
                  id="generateCouponCode" title="隨機產生 8 碼優惠碼">
            <i class="fas fa-dice"></i>
          </button>
        </div>
      </div>

      <!-- 折扣類型 Switch + 輸入欄 -->
      <div class="col-md-4">
        <!-- Switch：切換「折扣金額」或「折數」 -->
        <div class="form-check form-switch mb-1 d-flex align-items-center gap-2 ps-0">
          <span class="small text-muted">折扣金額</span>
          <input class="form-check-input ms-0" type="checkbox"
                 role="switch" id="discountTypeSwitch">
          <span class="small text-muted">折數</span>
        </div>
        <!-- 動態 label（由 JS 切換文字） -->
        <label class="form-label small text-muted" for="newCouponDiscount" id="discountLabel">
          折扣金額 (NT$) <span class="text-danger">*</span>
        </label>
        <!-- 動態 input（由 JS 切換 min/max/step/placeholder） -->
        <input type="number" class="form-control" id="newCouponDiscount"
               placeholder="例：200" min="1" step="1">
      </div>

      <!-- 發行數量 -->
      <div class="col-md-4">
        <label class="form-label small text-muted" for="newCouponQty">
          發行數量
        </label>
        <input type="number" class="form-control" id="newCouponQty"
               placeholder="例：50" min="1" max="999" value="50">
      </div>

      <!-- ===== 第二列：有效期限（起始 + 結束各佔半行） ===== -->

      <!-- 起始時間（含「有效期限」label） -->
      <div class="col-md-6">
        <label class="form-label small text-muted">有效期限</label>
        <div class="input-group">
          <span class="input-group-text px-2" style="font-size:0.85rem;">起</span>
          <input type="datetime-local" class="form-control" id="newCouponStart">
          <button class="btn btn-outline-secondary" type="button"
                  id="setCouponStartNow" title="填入現在時間">現在</button>
        </div>
      </div>

      <!-- 結束時間（無 label，靠 align-items-end 自動對齊底部） -->
      <div class="col-md-6">
        <div class="input-group">
          <span class="input-group-text px-2" style="font-size:0.85rem;">迄</span>
          <input type="datetime-local" class="form-control" id="newCouponEnd">
        </div>
      </div>

      <!-- ===== 第三列：新增按鈕靠右（ms-auto 推到最右側） ===== -->
      <div class="col-auto ms-auto">
        <button class="btn px-4 text-white fw-semibold" id="submitAddCoupon"
                style="background-color: var(--admin-brand-accent);">
          <i class="fas fa-plus me-1"></i>新增
        </button>
      </div>

    </div><!-- end row -->
  </div>
</div><!-- end card -->

<!-- ===== 現有折扣券列表 ===== -->
<div class="card shadow-sm border-0">
  <div class="card-header bg-white border-0 py-3">
    <h6 class="fw-semibold mb-0">
      <i class="fas fa-list me-2 text-muted"></i>現有折扣券列表
    </h6>
  </div>
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover mb-0 admin-data-table">
        <thead class="table-light">
          <tr>
            <th>折扣碼</th>
            <th>折扣金額</th>
            <th class="text-center">總數量</th>
            <th class="text-center">已使用</th>
            <th class="text-center">剩餘</th>
            <th>開始時間</th>
            <th>結束時間</th>
            <th>狀態</th>
            <th>操作</th>
          </tr>
        </thead>
        <!-- tbody 由 discounts.js 的 renderCouponsTable() 動態填入 -->
        <tbody id="couponsTableBody">
          <tr>
              <td colspan="9" class="text-center py-4">
              <div class="spinner-border spinner-border-sm me-2"
                   style="color: var(--admin-brand-accent);"></div>
              <span class="text-muted">載入折扣券中...</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div><!-- end card -->
</section>
