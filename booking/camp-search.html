<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#244d4d">
  <meta name="description" content="搜尋並篩選台灣最美露營區，選擇最適合你的營地。">
  <link rel="icon" href="../assets/images/brand_icon.png" type="image/png">
  <title> 搜尋營區 | Yuruicamp 露營選物</title>

  <!-- 主樣式 / Main stylesheet -->
  <!-- <link rel="stylesheet" href="../css/main.css"> -->
  <!-- 預約模組專屬樣式 / Booking module stylesheet -->
   <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/booking.css">
  <link rel="stylesheet" href="./css/base.css">
  
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

  <!-- 預約系統專屬 Header（由 jQuery 動態載入）/ Booking header loaded by jQuery -->
  <div id="booking-header"></div>

  <main class="search-page">

    <!-- =====================================================
         頂部搜尋列 / Top Search Bar
         ===================================================== -->
    <section class="search-bar-section">
      <div class="search-bar">
        <input type="date" id="checkInDate"  class="search-bar__input" title="預約日期" aria-label="預約日期">
        <input type="date" id="checkOutDate" class="search-bar__input" title="結束日期" aria-label="結束日期">
        <select id="guestCount" class="search-bar__select" title="人數">
          <option value="">人數</option>
          <option value="1">1 人</option>
          <option value="2">2 人</option>
          <option value="4">4 人</option>
          <option value="6">6 人以上</option>
        </select>
        <select id="regionFilter" class="search-bar__select" title="地區">
          <option value="">所有地區</option>
          <option value="北部">北部</option>
          <option value="中部">中部</option>
          <option value="南部">南部</option>
          <option value="東部">東部</option>
        </select>
        <button id="searchBtn" class="btn btn--primary">
          <i class="bi bi-search"></i> 搜尋
        </button>
      </div>
    </section>

    <!-- =====================================================
         主內容：左側篩選 + 右側卡片
         Main Content: Sidebar Filter + Card Grid
         ===================================================== -->
    <div class="search-layout">

      <!-- 左側篩選器 / Left Sidebar Filter -->
      <aside class="filter-sidebar">

        <!-- 行動版展開按鈕（桌面版隱藏）/ Mobile toggle (hidden on desktop) -->
        <button class="filter-sidebar__toggle" id="filterToggle" aria-expanded="false">
          <i class="bi bi-funnel"></i>&nbsp; 篩選條件
        </button>

        <div class="filter-sidebar__body" id="filterBody">

          <!-- 篩選區塊 A：環境特徵 / Filter Group A: Environment Tags -->
          <div class="filter-group">
            <h4 class="filter-group__title">環境特徵</h4>
            <label><input type="checkbox" name="env" value="高海拔"> 高海拔</label>
            <label><input type="checkbox" name="env" value="低海拔"> 低海拔</label>
            <label><input type="checkbox" name="env" value="有雲海"> 有雲海</label>
            <label><input type="checkbox" name="env" value="有溪流"> 有溪流</label>
            <label><input type="checkbox" name="env" value="森林系"> 森林系</label>
          </div>

          <!-- 篩選區塊 B：營區設施 / Filter Group B: Facility Tags -->
          <div class="filter-group">
            <h4 class="filter-group__title">營區設施</h4>
            <label><input type="checkbox" name="facility" value="有雨棚">有雨棚</label>
            <label><input type="checkbox" name="facility" value="裝備租借">裝備租借</label>
            <label><input type="checkbox" name="facility" value="小木屋">小木屋</label>
            <label><input type="checkbox" name="facility" value="寵物友善"> 寵物友善</label>
            <label><input type="checkbox" name="facility" value="兒童遊樂設施">兒童遊樂設施</label>
            <label><input type="checkbox" name="facility" value="獨立衛浴">獨立衛浴</label>
            <label><input type="checkbox" name="facility" value="可包區"> 可包區</label>
          </div>

          <button id="resetFilterBtn" class="btn btn--outline">
            <i class="bi bi-arrow-counterclockwise"></i> 重設篩選
          </button>

        </div>
      </aside>

      <!-- 右側：搜尋結果 / Right: Search Results -->
      <section class="search-results">

        <!-- 結果數量顯示 / Result count -->
        <div class="search-results__header">
          <p id="resultCount">載入中...</p>
        </div>

        <!-- 卡片容器（由 jQuery 動態填入）/ Card container (filled by jQuery) -->
        <div class="camp-card-grid" id="campCardGrid">
          <div class="loading-skeleton" id="loadingSkeleton">
            <i class="bi bi-hourglass-split"></i> 載入營區資料中...
          </div>
        </div>

      </section>

    </div>

  </main>

  <!-- 預約系統專屬 Footer / Booking footer -->
  <div id="booking-footer"></div>

  <!-- =====================================================
       依賴順序：jQuery → 共用 JS → 頁面邏輯
       Load order: jQuery → shared JS → page logic
       ===================================================== -->
       <script src="./js/layout.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    // 載入共用的 Header / Footer
    // Load shared header and footer components
    $(function () {
      // 載入預約系統專屬 Header / Footer（非買家端的 ../components/）
      $('#booking-header').load('./components/booking-header.html');
      $('#booking-footer').load('./components/booking-footer.html');
    });
  </script>
  
  
  <script src="./js/camp-search.js"></script>

</body>
</html>
