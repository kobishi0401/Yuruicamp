<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#244d4d">
  <link rel="icon" href="../assets/images/brand_icon.png" type="image/png">
  <title>營區詳情 | Yuruicamp 露營選物</title>

  <!-- 預約模組樣式 / Booking stylesheet -->
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/booking.css">
  <!-- Flatpickr 日期選擇器 CSS / Flatpickr datepicker CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <style>
    /* 詳情頁微調 / Detail page minor overrides */
    .detail-page { padding-top: 1.5rem; }
  </style>
</head>
<body>

  <!-- 預約系統專屬 Header / Booking header -->
  <div id="booking-header"></div>

  <main class="detail-page">

    <!-- 麵包屑 / Breadcrumb -->
    <nav class="breadcrumb" aria-label="麵包屑導航">
      <a href="./camp-search.html"><i class="bi bi-house"></i> 搜尋營區</a>
      <span style="margin:0 .4rem;color:#999;">/</span>
      <span id="breadcrumbName">載入中...</span>
    </nav>

    <!-- =====================================================
         營區標題區 / Camp Header
         由 camp-detail.js 動態填入
         ===================================================== -->
    <section class="camp-header" id="campHeader">
      <div class="loading-skeleton"><i class="bi bi-hourglass-split"></i> 載入中...</div>
    </section>

    <!-- =====================================================
         主內容：左側資訊 + 右側預約表單
         Main: Left Info + Right Booking Form
         ===================================================== -->
    <div class="detail-layout">

      <!-- 左側：圖片 + 營區介紹 / Left: Gallery + Description -->
      <div class="camp-info">

        <!-- 圖片區 / Gallery -->
        <div class="camp-gallery" id="campGallery"></div>

        <!-- 介紹文字 / Description -->
        <div class="camp-description" id="campDescription"></div>

      </div>

      <!-- 右側：預約表單卡片 / Right: Booking Form Card -->
      <aside class="booking-form-card">
        <h2 class="booking-form-card__title">
          <i class="bi bi-calendar-check"></i> 選擇日期與營位
        </h2>

        <!-- 日期範圍（Flatpickr）/ Date range picker -->
        <div class="form-group">
          <label for="dateRange">
            <i class="bi bi-calendar3"></i> 入住 → 退房日期
          </label>
          <input type="text" id="dateRange" class="form-control"
                 placeholder="點擊選擇日期範圍" readonly>
        </div>

        <!-- 日期計算結果 / Date calculation result -->
        <div class="date-summary" id="dateSummary" style="display:none;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem;">
            <span>總天數</span>
            <strong><span id="totalDays">0</span> 晚</strong>
          </div>
          <div style="display:flex;justify-content:space-between;">
            <span id="weekdayLabel">平日 0 晚</span>
            <span id="holidayLabel">假日 0 晚</span>
          </div>
        </div>

        <!-- 人數選擇 / Guest count -->
        <div class="form-group">
          <label for="guestNum">
            <i class="bi bi-people"></i> 人數
          </label>
          <input type="number" id="guestNum" class="form-control"
                 min="1" max="30" value="2" placeholder="請輸入人數">
        </div>

        <!-- 營位類型選擇 / Zone type selection -->
        <div class="form-group">
          <label><i class="bi bi-grid-3x3-gap"></i> 選擇營位類型</label>
          <div class="zone-list" id="zoneList">
            <p style="font-size:.875rem;color:#999;text-align:center;padding:1rem 0;">
              請先選擇日期後，再選擇營位類型
            </p>
          </div>
        </div>

        <!-- 費用小計 / Price subtotal -->
        <div class="price-summary" id="priceSummary" style="display:none;">
          <span class="price-summary__label">住宿費小計</span>
          <strong class="price-summary__amount" id="zonePriceTotal">NT$0</strong>
        </div>

        <!-- 確認按鈕 / Confirm button -->
        <button class="btn btn--primary btn--full" id="confirmBookingBtn" disabled>
          下一步：選擇租借裝備 <i class="bi bi-arrow-right"></i>
        </button>
        <p class="booking-form-card__hint">
          確認後可加選租借裝備，也可直接前往結帳。
        </p>

      </aside>

    </div>

    <!-- =====================================================
         營位詳細資訊表格 / Zone Info Table
         ===================================================== -->
    <section class="zone-table-section">
      <h3><i class="bi bi-table"></i> 營位類型完整資訊</h3>
      <div style="overflow-x:auto;">
        <table class="zone-table">
          <thead>
            <tr>
              <th>營位類型</th>
              <th>每位容納</th>
              <th>平日價（每晚）</th>
              <th>假日價（每晚）</th>
              <th>總數量</th>
            </tr>
          </thead>
          <tbody id="zoneTableBody">
            <!-- 由 JS 動態填入 / Filled by JS -->
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- 預約系統專屬 Footer / Booking footer -->
  <div id="booking-footer"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Flatpickr JS -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <!-- Flatpickr 繁中語系 / Traditional Chinese locale -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh-tw.js"></script>
  <script>
    $(function () {
      // 載入預約系統專屬 Header / Footer（非買家端的 ../components/）
      $('#booking-header').load('./components/booking-header.html');
      $('#booking-footer').load('./components/booking-footer.html');
    });
  </script>
  <script src="./js/camp-detail.js"></script>

</body>
</html>
