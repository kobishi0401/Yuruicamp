<!-- ============================================================
     booking-header.html — 預約系統專屬 Header 元件
     背景色 #F2F0EB（大地米色），與買家端 #f6fbf6 做視覺區分
     ============================================================ -->
<header class="booking-header" id="booking-header">
  <nav class="bk-navbar">
    <div class="bk-navbar__inner">

      <!-- ======================================================
           左側：品牌識別區
           Logo 點擊後回到預約系統首頁 camp-search.html
           ====================================================== -->
      <div class="bk-navbar__brand">
        <a href="./camp-search.html" class="bk-brand-link" aria-label="回到營區搜尋首頁">
          
          Yuruicamp
          <!-- 副標題：低彩度小字，讓使用者感受到「已切換頻道」 -->
          <span class="brand-sub">| 營地預約</span>
        </a>
      </div>

      <!-- ======================================================
           中間：核心導覽列（桌機版顯示）
           ====================================================== -->
      <ul class="bk-navbar__menu bk-hidden-mobile">
        <li><a href="./camp-search.html"    class="bk-nav-link" id="navSearch">探索營區</a></li>
        <li><a href="./rental-guide.html"  class="bk-nav-link" id="navRentalGuide">租借體驗說明</a></li>
        <li><a href="./booking-faq.html"   class="bk-nav-link" id="navFaq">常見問題</a></li>
        <li><a href="./member-center.html" class="bk-nav-link" id="navMember">會員中心</a></li>
      </ul>

      <!-- ======================================================
           右側：操作區（三個功能）
           ====================================================== -->
      <div class="bk-navbar__actions">

        <!-- ① 系統切換鈕：前往裝備商城 -->
        <a href="../pages/home.html"
           class="btn btn--primary bk-switch-btn"
           title="前往裝備商城">
          <span class="bk-switch-btn__text">前往裝備商城</span>
        </a>

        <!-- ② 預約背包（Booking Cart）含動態 Badge -->
        <a href="./booking-cart.html"
           class="bk-cart-btn"
           title="預約背包"
           aria-label="預約背包">
          <i class="bi bi-bag-heart"></i>
          <!-- Badge：JS 動態控制顯示/隱藏與數字 -->
          <span class="bk-badge" id="bookingBadge" style="display:none;">0</span>
        </a>

        <!-- ③ 會員登入按鈕（未登入狀態，登入後由 JS 切換為頭像）
             onclick 由 booking-header.js 的 initLoginModal() 綁定，此處不加 onclick 避免重複觸發 -->
        <button class="btn btn--outline bk-login-btn"
                id="bkLoginBtn"
                title="登入">
          登入
        </button>

        <!-- ③ 已登入狀態：頭像 + 姓名（預設隱藏，登入後由 JS 顯示） -->
        <div class="bk-user-menu" id="bkUserMenu" style="display:none;">
          <div class="bk-user-avatar" id="bkUserAvatar">?</div>
          <span class="bk-user-name" id="bkUserName">用戶</span>
          <!-- 點設定齒輪 → 會員中心，預設開啟「我的露營行程」頁籤 -->
          <a href="./member-center.html"
             class="bk-settings-btn"
             title="會員中心">
            <i class="bi bi-gear"></i>
          </a>
        </div>

        <!-- 手機版漢堡選單按鈕 -->
        <button class="bk-hamburger bk-hidden-desktop"
                id="bkHamburger"
                aria-label="展開選單"
                aria-expanded="false">
          <i class="bi bi-list"></i>
        </button>

      </div>
    </div>
  </nav>

  <!-- ============================================================
       Offcanvas 側邊選單（手機版）
       展開時顯示 5 個連結
       ============================================================ -->
  <div class="bk-offcanvas" id="bkOffcanvas" role="dialog" aria-label="行動版選單">
    <div class="bk-offcanvas__header">
      <span class="bk-offcanvas__title">Yuruicamp <span class="brand-sub">| 營地預約</span></span>
      <button class="bk-offcanvas__close" id="bkOffcanvasClose" aria-label="關閉選單">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
    <nav class="bk-offcanvas__body">
      <ul class="bk-offcanvas__list">
        <li><a href="./camp-search.html">探索營區</a></li>
        <li><a href="./rental-guide.html">租借體驗說明</a></li>
        <li><a href="./booking-faq.html">常見問題</a></li>
        <li><a href="./member-center.html">會員中心</a></li>
        <!-- 分隔線 -->
        <li class="bk-offcanvas__divider"></li>
        <li>
          <a href="../pages/home.html" class="bk-offcanvas__switch">
            前往裝備商城
          </a>
        </li>
        <li>
          <a href="./booking-cart.html" class="bk-offcanvas__cart">
            <i class="bi bi-bag-heart"></i> 預約背包
            <span class="bk-badge bk-badge--inline" id="bookingBadgeMobile" style="display:none;">0</span>
          </a>
        </li>
      </ul>
    </nav>
  </div>

  <!-- Offcanvas 背景遮罩 -->
  <div class="bk-offcanvas-backdrop" id="bkBackdrop"></div>

  <!-- 登入 Modal（共用與買家端相同結構） -->
  <div id="loginModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="bkLoginModalTitle">
    <div class="modal-content" style="max-width:420px;">
      <div class="modal-header">
        <h5 class="modal-title" id="bkLoginModalTitle">歡迎加入 </h5>
        <button class="modal-close" title="關閉">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-tabs">
          <button class="modal-tab-btn active" data-tab="login">登入</button>
          <button class="modal-tab-btn" data-tab="register">免費註冊</button>
        </div>
        <div class="modal-tab-panel active" data-panel="login">
          <form id="bkLoginEmailForm" novalidate>
            <div style="margin-bottom:1rem;">
              <label for="bkLoginEmail" style="display:block;font-weight:600;margin-bottom:.35rem;font-size:.875rem;">電子郵件</label>
              <input id="bkLoginEmail" type="email" name="email" placeholder="your@email.com" required
                     style="width:100%;padding:.6rem .9rem;border:2px solid #d4e6e6;border-radius:6px;font-size:.95rem;">
            </div>
            <div style="margin-bottom:1.25rem;">
              <label for="bkLoginPassword" style="display:block;font-weight:600;margin-bottom:.35rem;font-size:.875rem;">密碼</label>
              <input id="bkLoginPassword" type="password" name="password" placeholder="輸入密碼" required
                     style="width:100%;padding:.6rem .9rem;border:2px solid #d4e6e6;border-radius:6px;font-size:.95rem;">
            </div>
            <button type="submit" class="btn btn--primary" style="width:100%;">登入</button>
          </form>
        </div>
        <div class="modal-tab-panel" data-panel="register">
          <form id="bkRegisterForm" novalidate>
            <div style="margin-bottom:1rem;">
              <label for="bkRegisterName" style="display:block;font-weight:600;margin-bottom:.35rem;font-size:.875rem;">您的姓名</label>
              <input id="bkRegisterName" type="text" name="name" placeholder="露友小明" required
                     style="width:100%;padding:.6rem .9rem;border:2px solid #d4e6e6;border-radius:6px;font-size:.95rem;">
            </div>
            <div style="margin-bottom:1rem;">
              <label for="bkRegisterEmail" style="display:block;font-weight:600;margin-bottom:.35rem;font-size:.875rem;">電子郵件</label>
              <input id="bkRegisterEmail" type="email" name="email" placeholder="your@email.com" required
                     style="width:100%;padding:.6rem .9rem;border:2px solid #d4e6e6;border-radius:6px;font-size:.95rem;">
            </div>
            <div style="margin-bottom:1.25rem;">
              <label for="bkRegisterPassword" style="display:block;font-weight:600;margin-bottom:.35rem;font-size:.875rem;">設定密碼</label>
              <input id="bkRegisterPassword" type="password" name="password" placeholder="至少 8 個字元" minlength="8" required
                     style="width:100%;padding:.6rem .9rem;border:2px solid #d4e6e6;border-radius:6px;font-size:.95rem;">
            </div>
            <button type="submit" class="btn btn--primary" style="width:100%;">立即註冊</button>
          </form>
        </div>
      </div>
    </div>
  </div>
  <!-- Modal 背景遮罩 -->
  <div class="bk-modal-backdrop" id="bkModalBackdrop"></div>

</header>

<!-- ============================================================
     booking-header.js：Badge 更新 + 登入狀態 + Offcanvas 邏輯
     必須在 Header HTML 載入後才引入，確保 DOM 元素存在
     ============================================================ -->
<script src="./js/booking-header.js"></script>
