<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#73816E">
  <meta name="description" content="搜尋並篩選台灣最美露營區，選擇最適合你的營地。">
  <link rel="icon" href="../../assets/icons/camping_icon.png" type="image/png">
  <title> 搜尋營區 | Yuruicamp 露營選物</title>

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/booking.css">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    /* ── Hero 搜尋列：強制單行，擴大容器寬度 ── */
    .hero-content {
      max-width: 900px;
      /* 原 layout.css 700px 不夠放 5 個欄位，加寬 */
    }

    .hero-banner .search-bar {
      flex-wrap: nowrap;
    }

    .hero-banner .search-bar .search-bar__input,
    .hero-banner .search-bar .search-bar__select {
      min-width: 0;
      /* 允許縮到比 160px 更窄，維持單行 */
    }

    /* ── 搜尋列各欄位比例微調 (新增) ── */
    #dateRange {
      flex: 2.5 1 0; /* 日期範圍加寬 */
    }
    
    #guestCount,
    #regionFilter {
      flex: 1 1 0; /* 人數與地區縮窄 */
    }

    /* ── Dual-Thumb Price Slider ── */
    .price-range-display {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--bk-primary);
      text-align: center;
      margin-bottom: 1.25rem;
    }

    .price-range-track-wrap {
      position: relative;
      height: 6px;
      margin: 0.6rem 0 0.5rem;
    }

    /* 底色軌道 */
    .price-range-track-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--bk-border, #d8e4e4);
      border-radius: 3px;
    }

    /* 選取範圍的亮色填充，由 JS 控制 left / width */
    .price-range-fill {
      position: absolute;
      top: 0;
      height: 6px;
      background: var(--bk-primary);
      border-radius: 3px;
      pointer-events: none;
    }

    /* 兩個 range 疊在同一位置，背景透明 */
    .price-range-track-wrap input[type="range"] {
      position: absolute;
      width: 100%;
      top: 50%;
      transform: translateY(-50%);
      height: 6px;
      background: transparent;
      pointer-events: none;
      -webkit-appearance: none;
      appearance: none;
      margin: 0;
      padding: 0;
      outline: none;
    }

    #priceMin {
      z-index: 3;
    }

    #priceMax {
      z-index: 4;
    }

    /* WebKit thumb */
    .price-range-track-wrap input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--bk-primary);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.18);
      cursor: pointer;
      pointer-events: all;
    }

    .price-range-track-wrap input[type="range"]::-webkit-slider-runnable-track {
      background: transparent;
      height: 6px;
    }

    /* Firefox thumb */
    .price-range-track-wrap input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--bk-primary);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.18);
      cursor: pointer;
      pointer-events: all;
    }

    .price-range-track-wrap input[type="range"]::-moz-range-track {
      background: transparent;
    }

    .price-range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--bk-text-muted);
      margin-top: 0.75rem;
    }
  </style>
</head>

<body>

  <div id="booking-header"></div>

  <section class="hero-banner" id="heroBanner">

    <video autoplay loop muted playsinline>
      <source src="../../assets/videos/hero_video.mp4" type="video/mp4">
    </video>

    <div class="hero-content">

      <h1 class="hero-title">尋找你的山林棲所</h1>
      <p class="hero-subtitle">在這裡，選擇屬於你的季節與寧靜</p>

      <section class="search-bar-section">
        <div class="search-bar">
          <input type="text" id="dateRange" class="search-bar__input" placeholder="入住日期 → 退房日期" readonly aria-label="預約日期範圍">
          
          <select id="guestCount" class="search-bar__select" title="人數">
            <option value="">人數</option>
            <option value="1">1 人</option>
            <option value="2">2 人</option>
            <option value="4">4 人</option>
            <option value="6">6 人以上</option>
          </select>
          <select id="regionFilter" class="search-bar__select" title="地區">
            <option value="">所有地區</option>
            <option value="北部">北部</option>
            <option value="中部">中部</option>
            <option value="南部">南部</option>
            <option value="東部">東部</option>
          </select>
          <button id="searchBtn" class="btn btn--primary">
            <i class="bi bi-search"></i> 搜尋
          </button>
        </div>
      </section>
    </div>

  </section>

  <main class="search-page">

    <div class="search-layout">

      <aside class="filter-sidebar">

        <button class="filter-sidebar__toggle" id="filterToggle" aria-expanded="false">
          <i class="bi bi-funnel"></i>&nbsp; 篩選條件
        </button>

        <div class="filter-sidebar__body" id="filterBody">

          <div class="filter-group">
            <h4 class="filter-group__title">環境特徵</h4>
            <label><input type="checkbox" name="env" value="高海拔"> 高海拔</label>
            <label><input type="checkbox" name="env" value="低海拔"> 低海拔</label>
            <label><input type="checkbox" name="env" value="有雲海"> 有雲海</label>
            <label><input type="checkbox" name="env" value="有溪流"> 有溪流</label>
            <label><input type="checkbox" name="env" value="森林系"> 森林系</label>
          </div>

          <div class="filter-group">
            <h4 class="filter-group__title">營區設施</h4>
            <label><input type="checkbox" name="facility" value="有雨棚">有雨棚</label>
            <label><input type="checkbox" name="facility" value="裝備租借">裝備租借</label>
            <label><input type="checkbox" name="facility" value="小木屋">小木屋</label>
            <label><input type="checkbox" name="facility" value="寵物友善"> 寵物友善</label>
            <label><input type="checkbox" name="facility" value="兒童遊樂設施">兒童遊樂設施</label>
            <label><input type="checkbox" name="facility" value="獨立衛浴">獨立衛浴</label>
            <label><input type="checkbox" name="facility" value="可包區"> 可包區</label>
          </div>

          <div class="filter-group">
            <h4 class="filter-group__title">每晚預算（平日）</h4>
            <div class="price-range-slider">
              <div class="price-range-display" id="priceRangeDisplay">NT$500 - NT$5,000+</div>
              <div class="price-range-track-wrap">
                <div class="price-range-fill" id="priceRangeFill"></div>
                <input type="range" id="priceMin" min="500" max="5000" step="500" value="500">
                <input type="range" id="priceMax" min="500" max="5000" step="500" value="5000">
              </div>
              <div class="price-range-labels">
                <span>NT$500</span>
                <span>NT$5,000+</span>
              </div>
            </div>
          </div>

          <button id="resetFilterBtn" class="btn btn--outline">
            <i class="bi bi-arrow-counterclockwise"></i> 重設篩選
          </button>

        </div>
      </aside>

      <section class="search-results">

        <div class="search-results__header">
          <p id="resultCount">載入中...</p>
        </div>

        <div class="camp-card-grid" id="campCardGrid">
          <div class="loading-skeleton" id="loadingSkeleton">
            <i class="bi bi-hourglass-split"></i> 載入營區資料中...
          </div>
        </div>

      </section>

    </div>

  </main>

  <div id="booking-footer"></div>

  <script src="../js/layout.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh-tw.js"></script>

  <script>
    // 載入共用的 Header / Footer
    // Load shared header and footer components
    $(function () {
      // 載入預約系統專屬 Header / Footer（非買家端的 ../components/）
      window.loadBookingSharedLayout();
    });
  </script>

  <script src="../js/camp-search.js"></script>

</body>

</html>
