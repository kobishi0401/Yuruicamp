<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#244d4d">
  <link rel="icon" href="../assets/images/brand_icon.png" type="image/png">
  <title>確認預約結帳 | Yuruicamp 露營選物</title>

  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/booking.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>

  <!-- 預約系統專屬 Header / Booking header -->
  <div id="booking-header"></div>

  <main class="booking-cart-page">

    <!-- =====================================================
         步驟進度列 / Step Progress Bar
         ===================================================== -->
    <div class="step-progress" style="padding-top:1rem;">
      <div class="step completed">
        <span><i class="bi bi-check-lg"></i></span>
        選擇營區
      </div>
      <div class="step completed">
        <span><i class="bi bi-check-lg"></i></span>
        選擇日期
      </div>
      <div class="step completed">
        <span><i class="bi bi-check-lg"></i></span>
        租借裝備
      </div>
      <div class="step active">
        <span>4</span>
        確認結帳
      </div>
    </div>

    <!-- =====================================================
         主內容：左側明細 + 右側費用摘要
         Main: Left Details + Right Cost Summary
         ===================================================== -->
    <div class="booking-cart-layout">

      <!-- 左側：預約明細 / Left: Booking Details -->
      <div class="booking-cart-details">

        <!-- 住宿資訊 / Stay Info -->
        <section class="cart-section" id="staySection">
          <h3 class="cart-section__title">
            <i class="bi bi-house-door"></i> 住宿資訊
          </h3>
          <div id="stayDetail">
            <div class="loading-skeleton">
              <i class="bi bi-hourglass-split"></i> 載入中...
            </div>
          </div>
        </section>

        <!-- 租借裝備 / Rental Equipment -->
        <section class="cart-section" id="rentalSection">
          <h3 class="cart-section__title">
            <i class="bi bi-bag"></i> 租借裝備
          </h3>
          <div id="rentalDetail">
            <!-- 由 JS 動態填入 / Filled by JS -->
          </div>
        </section>

        <!-- 導購區：裝備推薦 / Upsell: Equipment Recommendation -->
        <section class="cart-section" id="upsellSection" style="display:none;">
          <h3 class="cart-section__title" style="color:var(--bk-gold);">
            <i class="bi bi-star"></i> 喜歡這些裝備嗎？
          </h3>
          <p style="font-size:.9rem;color:#555;margin-bottom:1rem;">
            租借體驗後，若想擁有自己的裝備，可至選物商店選購全新商品。
          </p>
          <a href="../pages/products.html" class="btn btn--outline">
            <i class="bi bi-shop"></i> 前往選購露營裝備
          </a>
        </section>

      </div>

      <!-- 右側：費用摘要 + 結帳 / Right: Cost Summary + Checkout -->
      <aside class="booking-cart-summary">
        <h3>費用明細</h3>

        <!-- 費用逐項 / Cost breakdown -->
        <div id="costBreakdown">
          <!-- 由 JS 動態填入 / Filled by JS -->
        </div>

        <!-- 應付總金額 / Total amount due -->
        <div class="cost-total">
          <span>應付總金額</span>
          <strong class="cost-total__amount" id="finalAmount">NT$0</strong>
        </div>

        <!-- 聯絡資訊表單 / Contact info form -->
        <div class="contact-form">
          <h4><i class="bi bi-person"></i> 訂購人資訊</h4>
          <input type="text"  id="contactName"  class="form-control"
                 placeholder="訂購人姓名 *" required>
          <input type="tel"   id="contactPhone" class="form-control"
                 placeholder="手機號碼 *" required>
          <input type="email" id="contactEmail" class="form-control"
                 placeholder="電子信箱 *" required>
          <p style="font-size:.78rem;color:#999;margin-top:.25rem;margin-bottom:0;">
            * 確認信將寄送至此信箱
          </p>
        </div>

        <!-- 確認預約按鈕 / Confirm booking button -->
        <button class="btn btn--primary btn--full" id="confirmPayBtn">
          <i class="bi bi-check-circle"></i> 確認預約並送出
        </button>

        <!-- 返回修改 / Go back to modify -->
        <a href="./camp-rental.html" class="booking-cart-back-link" id="backToRentalLink">
          ← 返回修改裝備選擇
        </a>

        <!-- 結帳後導購橫幅（預設隱藏）/ Post-checkout upsell (hidden by default) -->
        <div class="upsell-banner" id="upsellBanner" style="display:none;">
          <p>🎉 預約已成功送出！</p>
          <p style="font-size:.85rem;margin-bottom:.75rem;">
            喜歡這次的裝備體驗嗎？前往選購屬於你的露營裝備。
          </p>
          <a href="../pages/products.html" class="btn btn--outline btn--full">
            <i class="bi bi-shop"></i> 前往選購新裝備
          </a>
          <a href="./camp-search.html"
             class="rental-skip-link" style="margin-top:.5rem;display:block;text-align:center;">
            再預約一次露營
          </a>
        </div>

      </aside>

    </div>

  </main>

  <!-- 預約系統專屬 Footer / Booking footer -->
  <div id="booking-footer"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    $(function () {
      // 載入預約系統專屬 Header / Footer（非買家端的 ../components/）
      $('#booking-header').load('./components/booking-header.html');
      $('#booking-footer').load('./components/booking-footer.html');
    });
  </script>
  <script src="./js/booking-cart.js"></script>

</body>
</html>
