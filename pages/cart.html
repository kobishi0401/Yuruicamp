<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Yuruicamp 購物車 - 查看已選商品並前往結帳">
  <meta name="theme-color" content="#244d4d">
  <title>購物車 - Yuruicamp 露營選物</title>
  <!-- 預先連線外部資源，減少 DNS 查詢延遲 / Preconnect to reduce DNS lookup latency -->
  <link rel="preconnect" href="https://picsum.photos">
  <link rel="dns-prefetch" href="https://picsum.photos">
  <link rel="stylesheet" href="../css/main.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22><i class="bi bi-tent"></i></text></svg>">
</head>
<body>

  <div id="header"></div>

  <!-- ===================================================
       頁面主體 Main Content
       =================================================== -->
  <main class="container" style="padding-top:2rem;padding-bottom:4rem;">

    <!-- 頁面標題 Page Title -->
    <div style="margin-bottom:2rem;">
      <h1 style="font-size:1.75rem;font-weight:800;color:#1a1a1a;margin:0 0 0.25rem 0;"><i class="bi bi-cart"></i> 我的購物車</h1>
      <p id="cartItemCount" style="color:#6b7280;font-size:0.95rem;margin:0;">
        <!-- 由 JS 更新商品數量 -->
      </p>
    </div>

    <!-- ===== 空購物車狀態 Empty Cart State ===== -->
    <div id="cartEmpty" class="cart-empty" style="display:none;text-align:center;padding:5rem 2rem;">
      <div style="font-size:5rem;margin-bottom:1.5rem;"><i class="bi bi-cart"></i></div>
      <h3 style="font-size:1.5rem;font-weight:700;color:#374151;margin-bottom:0.75rem;">購物車還是空的</h3>
      <p style="color:#9ca3af;font-size:1rem;margin-bottom:2rem;">去探索一些露營好物，加入購物車吧！</p>
      <a href="products.html" class="btn btn-primary" style="font-size:1rem;padding:0.875rem 2.5rem;">
        🛍️ 去逛逛
      </a>
    </div>

    <!-- ===== 購物車有商品時的兩欄佈局 ===== -->
    <div id="cartContent" class="cart-layout" style="display:none;">

      <!-- ===== 左側：商品列表 Cart Items List ===== -->
      <div class="cart-items-column">
        <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;">
          <!-- 列表標題 List header -->
          <div style="padding:1rem 1.25rem;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;">
            <span style="font-weight:700;color:#374151;font-size:0.95rem;">商品列表</span>
            <button id="clearCartBtn"
                    type="button"
                    style="background:none;border:none;color:#ef4444;font-size:0.85rem;cursor:pointer;padding:0.25rem 0.5rem;border-radius:4px;"
                    title="清空購物車">
              <i class="bi bi-trash"></i> 清空全部
            </button>
          </div>
          <!-- 商品卡片清單（由 JS 動態渲染）Cart items (rendered by JS) -->
          <div id="cartItemsList">
            <!-- JS 會將每個商品渲染為一張卡片 -->
          </div>
        </div>
      </div>

      <!-- ===== 右側：訂單摘要 Order Summary ===== -->
      <div class="cart-summary-column">
        <div class="order-summary-card" style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:1.5rem;position:sticky;top:5rem;">

          <h3 style="font-size:1.1rem;font-weight:700;color:#1a1a1a;margin:0 0 1.25rem 0;">訂單摘要</h3>

          <!-- 折扣碼輸入 Coupon Code Input -->
          <div style="margin-bottom:1.25rem;">
            <label style="display:block;font-size:0.875rem;font-weight:600;color:#374151;margin-bottom:0.5rem;">
               折扣碼
            </label>
            <div class="coupon-input-row" style="display:flex;gap:0.5rem;">
              <input type="text"
                     id="couponInput"
                     placeholder="輸入折扣碼（試試 WELCOME100）"
                     style="flex:1;padding:0.6rem 0.875rem;border:1px solid #d1d5db;border-radius:6px;font-size:0.875rem;outline:none;transition:border-color 0.2s;"
                     maxlength="20">
              <button id="applyCouponBtn"
                      type="button"
                      class="btn btn-secondary"
                      style="padding:0.6rem 1rem;font-size:0.875rem;white-space:nowrap;">
                套用
              </button>
            </div>
            <!-- 折扣碼結果提示 Coupon result message -->
            <div id="couponMessage" style="font-size:0.8rem;margin-top:0.4rem;display:none;"></div>
          </div>

          <hr style="border:none;border-top:1px solid #f0f0f0;margin:0 0 1.25rem 0;">

          <!-- 金額明細 Price Breakdown -->
          <div style="display:flex;flex-direction:column;gap:0.75rem;margin-bottom:1.25rem;">

            <!-- 小計 Subtotal -->
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span style="color:#6b7280;font-size:0.9rem;">商品小計</span>
              <span id="summarySubtotal" style="font-weight:600;color:#374151;font-size:0.9rem;">NT$0</span>
            </div>

            <!-- 折扣金額 Discount (hidden by default) -->
            <div id="summaryDiscountRow" style="display:none;justify-content:space-between;align-items:center;">
              <span style="color:#16a34a;font-size:0.9rem;"> 折扣碼優惠</span>
              <span id="summaryDiscount" style="font-weight:600;color:#16a34a;font-size:0.9rem;">-NT$0</span>
            </div>

            <!-- 運費 Shipping -->
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span style="color:#6b7280;font-size:0.9rem;">運費</span>
              <span id="summaryShipping" style="font-weight:600;color:#374151;font-size:0.9rem;">NT$60</span>
            </div>

            <!-- 免運提示 Free shipping hint -->
            <div id="freeShippingHint" style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:0.5rem 0.75rem;font-size:0.8rem;color:#16a34a;display:none;">
               已達免運費門檻！
            </div>
          </div>

          <hr style="border:none;border-top:2px solid #e5e7eb;margin:0 0 1.25rem 0;">

          <!-- 總計 Total -->
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
            <span style="font-weight:700;color:#1a1a1a;font-size:1rem;">合計</span>
            <span id="summaryTotal" style="font-weight:800;color:#244d4d;font-size:1.4rem;">NT$0</span>
          </div>

          <!-- 前往結帳按鈕 Checkout Button -->
          <button id="checkoutBtn"
                  type="button"
                  class="btn btn-primary btn-block"
                  style="font-size:1.05rem;padding:1rem;font-weight:700;">
            前往結帳 →
          </button>

          <!-- 繼續購物連結 Continue shopping link -->
          <a href="products.html"
             style="display:block;text-align:center;margin-top:0.875rem;color:#6b7280;font-size:0.875rem;text-decoration:none;">
            ← 繼續購物
          </a>

          <!-- 安全付款提示 Secure payment hint -->
          <div style="margin-top:1.25rem;padding-top:1rem;border-top:1px solid #f0f0f0;text-align:center;">
            <p style="font-size:0.78rem;color:#9ca3af;margin:0;"> 安全加密付款 · SSL 保護</p>
            <p style="font-size:0.78rem;color:#9ca3af;margin:0.25rem 0 0 0;">支援信用卡 / LINE Pay / 貨到付款</p>
          </div>

        </div><!-- /order-summary-card -->
      </div><!-- /cart-summary-column -->

    </div><!-- /cart-layout -->

  </main>

  
 <div id="footer"></div>

  <!-- ===================================================
       Script 載入
       =================================================== -->
  <script src="../js/config.js" defer></script>
  <script src="../js/api-mock.js" defer></script>
  <script src="../js/components/toast.js" defer></script>
  <script src="../js/components/modal.js" defer></script>
  <script src="../js/components/header.js" defer></script>
  <script src="../js/components/cart.js" defer></script>
  <script src="../js/pages/cart.js" defer></script>
  <script src="../js/main.js" defer></script>

</body>
</html>
