<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Yuruicamp 露營生活誌 - 探索戶外的每一步，都是故事。新手教學、景點推薦、裝備評測一次看。">
  <meta name="theme-color" content="#244d4d">
  <title>部落格 - Yuruicamp 露營選物</title>
  <!-- 預先連線外部資源，減少 DNS 查詢延遲 / Preconnect to reduce DNS lookup latency -->
  <link rel="preconnect" href="https://picsum.photos">
  <link rel="dns-prefetch" href="https://picsum.photos">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22><i class="bi bi-tent"></i></text></svg>">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

  <div id="header"></div>

  

  <!-- ===================================================
       主要內容
       =================================================== -->
  <main>

    <!-- -----------------------------------------------
         頁面 Banner：深綠漸層背景
         ----------------------------------------------- -->
    <section class="page-banner" style="background:linear-gradient(135deg, #1a3a2a 0%, #244d4d 50%, #2d6060 100%);">
      <div class="container">
        <h1 class="page-banner-title">露營生活誌</h1>
        <p class="page-banner-subtitle">探索戶外的每一步，都是故事</p>
      </div>
    </section>

    <!-- -----------------------------------------------
         主要內容容器
         ----------------------------------------------- -->
    <div class="container" style="padding-top:2rem; padding-bottom:3rem;">

      <!-- 精選文章（Featured Article）- 由 JS 動態渲染 -->
      <section id="featuredArticle" class="blog-featured" style="margin-bottom:2.5rem;">
        <!-- JS 會把精選文章渲染到這裡 -->
        <div style="text-align:center; padding:3rem; color:#999;">載入中...</div>
      </section>

      <!-- 分類篩選 Tab -->
      <div class="category-tabs" id="categoryTabs" style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1.5rem;">
        <button class="filter-btn active" data-cat="all">全部</button>
        <button class="filter-btn" data-cat="新手教學">新手教學</button>
        <button class="filter-btn" data-cat="景點推薦">景點推薦</button>
        <button class="filter-btn" data-cat="生活技巧">生活技巧</button>
        <button class="filter-btn" data-cat="裝備評測">裝備評測</button>
      </div>

      <!-- 文章網格 - 由 JS 動態渲染 -->
      <div class="products-grid" id="articlesGrid">
        <!-- JS 會把文章卡片渲染到這裡 -->
      </div>

      <!-- 若沒有文章則顯示空狀態 -->
      <div id="noArticles" style="display:none; text-align:center; padding:3rem; color:#999;">
        <div style="font-size:3rem; margin-bottom:1rem;"><i class="bi bi-envelope-open"></i></div>
        <p>目前沒有符合條件的文章</p>
      </div>

    </div>
  </main>

  <div id="footer"></div>
  <!-- ===================================================
       Script 載入順序（注意：有依賴關係）
       1. config.js   → 全局設定
       2. api-mock.js → 模擬 API（window.API）
       3. toast.js    → showToast 函數
       4. modal.js    → openModal 函數
       5. header.js   → 導航欄功能
       6. cart.js     → 購物車功能
       7. blog.js     → 部落格頁邏輯（本頁主要邏輯）
       8. main.js     → 應用初始化
       =================================================== -->
  <script src="../js/config.js" defer></script>
  <script src="../js/api-mock.js" defer></script>
  <script src="../js/components/toast.js" defer></script>
  <script src="../js/components/modal.js" defer></script>
  <script src="../js/components/header.js" defer></script>
  <script src="../js/components/cart.js" defer></script>
  <script src="../js/pages/blog.js" defer></script>
  <script src="../js/main.js" defer></script>

</body>
</html>
